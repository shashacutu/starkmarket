name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  contract-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
      - name: Install Stellar CLI
        run: |
          curl -fsSL https://github.com/stellar/stellar-cli/raw/main/install.sh | sh -s -- --dir=/home/runner/.cargo/bin
      - name: Build Contracts
        run: |
          cargo build -p royalty_splitter --target wasm32-unknown-unknown --release
          cargo build --target wasm32-unknown-unknown --release
      - name: Run Contract Tests
        run: cargo test

